name: zeroclaw-local-ci

services:
    local-ci:
        build:
            context: ..
            dockerfile: dev/ci/Dockerfile
        container_name: zeroclaw-local-ci
        working_dir: /workspace
        environment:
            - CARGO_TERM_COLOR=always
            - PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - CARGO_TARGET_DIR=/ci-target
        volumes:
            - ..:/workspace
            - cargo-registry:/usr/local/cargo/registry
            - cargo-git:/usr/local/cargo/git
            - ci-target:/ci-target

    postgres-hybrid:
        image: postgres:16-alpine
        environment:
            - POSTGRES_USER=zeroclaw
            - POSTGRES_PASSWORD=zeroclaw
            - POSTGRES_DB=zeroclaw_hybrid
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U zeroclaw -d zeroclaw_hybrid"]
            interval: 2s
            timeout: 3s
            retries: 30
        # Keep test state ephemeral and avoid host port exposure/conflicts.
        tmpfs:
            - /var/lib/postgresql/data:rw

volumes:
    cargo-registry:
    cargo-git:
    ci-target:
